services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: veracity
      POSTGRES_PASSWORD: veracity
      POSTGRES_DB: veracity
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+psycopg://veracity:veracity@db:5432/veracity
      APP_ENV: development
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  pgdata:
